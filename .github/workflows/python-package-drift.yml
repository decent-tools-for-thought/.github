name: Python Package Drift Check

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.13"
      package_import_name:
        required: true
        type: string
      cli_command:
        required: true
        type: string
      run_tests:
        required: false
        type: boolean
        default: false

jobs:
  verify-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Install test dependencies
        if: ${{ inputs.run_tests }}
        run: python -m pip install . pytest

      - name: Run unit tests
        if: ${{ inputs.run_tests }}
        run: python -m pytest

      - name: Build Python distributions
        run: python -m build

      - name: Verify wheel install
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install dist/*.whl
          .venv-wheel/bin/python -c "import ${{ inputs.package_import_name }}"
          .venv-wheel/bin/${{ inputs.cli_command }} --help >/dev/null

      - name: Verify sdist install
        run: |
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --upgrade pip setuptools wheel
          .venv-sdist/bin/python -m pip install --no-build-isolation dist/*.tar.gz
          .venv-sdist/bin/python -c "import ${{ inputs.package_import_name }}"
          .venv-sdist/bin/${{ inputs.cli_command }} --help >/dev/null
