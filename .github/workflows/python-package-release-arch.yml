name: Python Package Release With Arch

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.13"
      package_basename:
        required: true
        type: string
      python_artifact_name:
        required: false
        type: string
        default: python-dist
      arch_artifact_name:
        required: false
        type: string
        default: arch-pkg
      release_tag:
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Resolve release tag
        id: release_meta
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="${{ inputs.release_tag }}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -z "$tag" ]; then
            tag="v${version}"
          fi
          test "$tag" = "v${version}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.python_artifact_name }}
          path: dist/*

  arch-package:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: archlinux:base-devel

    steps:
      - uses: actions/checkout@v4

      - name: Install Arch packaging dependencies
        run: pacman -Syu --noconfirm git python-build python-installer python-keyring python-setuptools python-wheel

      - name: Prepare release source archive
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          archive_dir="$(mktemp -d)"
          tar \
            --exclude-vcs \
            --exclude='.gitignore' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='pkg' \
            --exclude='*.egg-info' \
            -czf "${archive_dir}/${{ inputs.package_basename }}-${VERSION}.tar.gz" \
            --transform "s,^,${{ inputs.package_basename }}-${VERSION}/," \
            .
          mv "${archive_dir}/${{ inputs.package_basename }}-${VERSION}.tar.gz" .

      - name: Build pacman package
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
          su builder -c "cd '$PWD' && makepkg --nodeps --skipinteg --noconfirm"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.arch_artifact_name }}
          path: |
            *.pkg.tar.zst
            *.pkg.tar.zst.sig
            PKGBUILD

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - arch-package

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          find artifacts -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          files: |
            artifacts/${{ inputs.python_artifact_name }}/*
            artifacts/${{ inputs.arch_artifact_name }}/*
            SHA256SUMS
